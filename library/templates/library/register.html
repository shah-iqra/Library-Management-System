{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Nest - Register</title>
    <link rel="stylesheet" href="{% static 'library/css/style.css' %}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2><span class="logo-text">📚 Book</span> Nest</h2>
        <p style="text-align:center; color:#777; margin-bottom:20px;">Create a new account</p>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Give username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="abc@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password1" id="password" placeholder="Enter the password" required>
                <span id="togglePassword" style="cursor:pointer; font-size:20px;">👁️</span>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="password2" placeholder="Enter password again" required>
            </div>
            <button type="submit" class="login-btn">Register</button>
        </form>

        <p style="text-align:center; margin-top:15px; color:#777;">
            Already have an account?
            <a href="{% url 'login' %}" style="color:#e94560;">Log in</a>
        </p>
    </div>
</div>
<script src="{% static 'library/js/main.js' %}"></script>
</body>
</html>
