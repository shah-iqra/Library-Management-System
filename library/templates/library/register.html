{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Nest - Sign Up</title>
    <link rel="stylesheet" href="{% static 'library/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="modern-login-body">
<div class="modern-login-wrapper" style="height: auto; padding-bottom: 20px;">
    <div class="card-header">
        <div class="logo">
            📚 <span class="brand-first" style="color: #b58055;">Book</span> Nest
        </div>
        <div class="header-right">
            Already have an account? <a href="{% url 'login' %}" class="dark-pill-btn">Log In</a>
        </div>
    </div>
    <div class="login-content-box">
        <div class="login-form-side">
            <h1 style="margin-bottom: 10px;">Create Account</h1>

            {% if error %}
                <div style="background:#ffe0e0; color:#c0392b; padding:8px 12px; border-radius:8px; margin-bottom:10px; font-size:14px;">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <!-- First & Last Name -->
                <div style="display: flex; gap: 12px;">
                    <div style="flex: 1;">
                        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">First Name</label>
                        <input type="text" name="first_name" placeholder="John" required
                               style="width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                    </div>
                    <div style="flex: 1;">
                        <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Last Name</label>
                        <input type="text" name="last_name" placeholder="Doe" required
                               style="width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                    </div>
                </div>

                <!-- Username -->
                <div style="margin-top:10px;">
                    <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Username</label>
                    <input type="text" name="username" placeholder="Choose a unique username" required
                           style="width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                </div>

                <!-- Email -->
                <div style="margin-top:10px;">
                    <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Email Address</label>
                    <input type="email" name="email" placeholder="email@example.com" required
                           style="width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                </div>

                <!-- Role -->
                <div style="margin-top:10px;">
                    <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Account Type</label>
                    <select name="role" required
                            style="width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; background:#f8f9ff; color:#333; box-sizing:border-box;">
                        <option value="user">👤 Regular User</option>
                        <option value="librarian">📖 Librarian</option>
                        <option value="admin">🛡️ Administrator</option>
                    </select>
                </div>

                <!-- Password -->
                <div style="margin-top:10px;">
                    <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Password</label>
                    <div style="position:relative;">
                        <input type="password" id="password1" name="password1" placeholder="Create a strong password" required
                               style="width:100%; padding:9px 45px 9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                        <span onclick="togglePassword('password1')"
                              style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:16px;">👁️</span>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div style="margin-top:10px;">
                    <label style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Confirm Password</label>
                    <div style="position:relative;">
                        <input type="password" id="password2" name="password2" placeholder="Re-enter your password" required
                               style="width:100%; padding:9px 45px 9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                        <span onclick="togglePassword('password2')"
                              style="position:absolute; right:12px; top:50%; transform:translateY(-50%); cursor:pointer; font-size:16px;">👁️</span>
                    </div>
                </div>

                <button type="submit" class="dark-full-btn" style="margin-top:15px;">Create Account</button>
            </form>
        </div>
        <div class="login-image-side">
            <img src="{% static 'library/images/stack_of_books.png' %}" alt="Books Illustration" class="login-img">
        </div>
    </div>
</div>

<script>
function togglePassword(fieldId) {
    const input = document.getElementById(fieldId);
    input.type = input.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
