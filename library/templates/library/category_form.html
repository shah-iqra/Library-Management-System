{% extends 'library/base.html' %}
{% block title %}{{ action }} Category{% endblock %}

{% block content %}
<div class="form-box">
    <h2>🏷️ {{ action }} Category</h2>

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Category Name</label>
            <input
                type="text"
                name="name"
                value="{% if category %}{{ category.name }}{% endif %}"
                placeholder="Enter category name"
                required
            >
        </div>

        <button type="submit" class="btn btn-primary">{{ action }} Category</button>
        <a href="{% url 'category_list' %}" class="btn" style="background:#aaa; color:white; margin-left:10px;">Cancel</a>
    </form>
</div>
{% endblock %}
