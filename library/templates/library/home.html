{% extends 'library/base.html' %}
{% block title %}Dashboard{% endblock %}

{% block content %}
<h2 style="margin-bottom:25px; color:#1a1a2e;">📊 Dashboard</h2>

<div class="cards">
    <div class="card">
        <div class="number">{{ total_books }}</div>
        <div class="label">📖 Total Books</div>
    </div>
    <div class="card">
        <div class="number">{{ total_members }}</div>
        <div class="label">👥 Total Members</div>
    </div>
    <div class="card">
        <div class="number">{{ total_borrows }}</div>
        <div class="label">🔄 Active Borrowings</div>
    </div>
</div>
{% endblock %}
