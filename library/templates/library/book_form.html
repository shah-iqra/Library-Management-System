{% extends 'library/base.html' %}
{% block title %}{{ action }} Book{% endblock %}

{% block content %}
<div class="form-box">
    <h2>📖 {{ action }} Book</h2>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="form-group">
            <label>Title</label>
            <input type="text" name="title" value="{{ form.instance.title }}" required>
        </div>
        <div class="form-group">
            <label>Author</label>
            <input type="text" name="author" value="{{ form.instance.author }}" required>
        </div>
        <div class="form-group">
            <label>ISBN</label>
            <input type="text" name="isbn" value="{{ form.instance.isbn }}" required>
        </div>
        <div class="form-group">
            <label>Total Copies</label>
            <input type="number" name="total_copies" value="{{ form.instance.total_copies|default:1 }}" min="1" required>
        </div>

        <!-- ✅ Image Upload -->
        <div class="form-group">
            <label>Book Cover Image</label>
            <input type="file" name="cover_image" accept="image/*">

            <!-- শুধু Edit এর সময় দেখাবে, Add এর সময় না -->
            {% if action == 'Edit' and form.instance.cover_image %}
                <div style="margin-top:10px;">
                    <p>Current Image:</p>
                    <img src="{{ form.instance.cover_image.url }}" 
                         style="width:100px; height:130px; object-fit:cover; border-radius:6px;">
                </div>
            {% endif %}
        </div>

        <button type="submit" class="btn btn-primary">{{ action }} Book</button>
        <a href="{% url 'book_list' %}" class="btn" style="background:#aaa; color:white; margin-left:10px;">Cancel</a>
    </form>
</div>
{% endblock %}
