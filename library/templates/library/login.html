{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Nest - Login</title>
    <link rel="stylesheet" href="{% static 'library/css/style.css' %}">
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <h2><span class="logo-text">📚 Book</span> Nest</h2>

        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Enter username" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" id="password" placeholder="Enter password" required>
                <span id="togglePassword" style="cursor:pointer; font-size:20px;">👁️</span>
            </div>
            <button type="submit" class="login-btn">Login</button>
        </form>
    </div>
</div>
<script src="{% static 'library/js/main.js' %}"></script>
</body>
</html>
