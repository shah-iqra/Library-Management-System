{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Nest - Login</title>
    <link rel="stylesheet" href="{% static 'library/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="modern-login-body">

<div class="modern-login-wrapper">
    <div class="card-header">
        <div class="logo">
            📚 <span class="brand-first" style="color: #b58055;">Book</span> Nest
        </div>
        <div class="header-right">
            Don't have an account?
            <a href="{% url 'register' %}" class="dark-pill-btn">Sign Up</a>
        </div>
    </div>

    <div class="login-content-box">
        <div class="login-form-side">
            <h1>Log in</h1>

            {% if error %}
                <div class="error-msg" style="background:#ffe0e0; color:#c0392b; padding:10px; border-radius:8px; margin-bottom:15px; font-size:14px;">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST" autocomplete="off">
                {% csrf_token %}

                <div class="modern-form-group">
                    <label for="username" style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Username or Email</label>
                    <input type="text" id="username" name="username"
                           placeholder="Enter your username or email" required
                           style="width:100%; padding:9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                </div>

                <div class="modern-form-group" style="margin-top:10px;">
                    <label for="password" style="font-size:13px; font-weight:600; display:block; margin-bottom:4px;">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password"
                               placeholder="Enter your password" required
                               style="width:100%; padding:9px 45px 9px 12px; border:1.5px solid #ddd; border-radius:8px; font-size:14px; box-sizing:border-box; background:#f8f9ff;">
                        
                        <span id="monkey-toggle" onclick="togglePassword()"
                              style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none;">
                            🙈
                        </span>
                    </div>
                </div>

                <div class="forgot-pass" style="text-align: right; margin: 10px 0;">
                    <a href="#" style="font-size: 13px; color: #b58055; text-decoration: none;">Forgot Password?</a>
                </div>

                <button type="submit" class="dark-full-btn" style="margin-top: 10px;">Log In</button>
            </form>

            <div class="social-login-section" style="text-align: center; margin-top: 25px;">
                <p style="font-size: 13px; color: #888;">Log in with</p>
                <div class="social-icons" style="display: flex; justify-content: center; gap: 15px; margin-top: 10px;">
                    <i class="fab fa-google" style="cursor:pointer;"></i>
                    <i class="fab fa-facebook-f" style="cursor:pointer;"></i>
                    <i class="fab fa-instagram" style="cursor:pointer;"></i>
                    <i class="fab fa-linkedin-in" style="cursor:pointer;"></i>
                </div>
            </div>
        </div>

        <div class="login-image-side">
            <img src="{% static 'library/images/stack_of_books.png' %}"
                 alt="Stack of Books"
                 class="login-img">
        </div>
    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const monkey = document.getElementById('monkey-toggle');
    
    if (input.type === 'password') {
        input.type = 'text';
        monkey.innerHTML = '🙈'; 
    } else {
        input.type = 'password';
        monkey.innerHTML = '👁️'; 
    }
}
</script>

</body>
</html>
