{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Nest - Login</title>

    <link rel="stylesheet" href="{% static 'library/css/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body class="modern-login-body">

<div class="modern-login-wrapper">

    <div class="card-header">
        <div class="logo">
            📚 <span class="brand-first">Book</span> Nest
        </div>

        <div class="header-right">
            Don't have an account?
            <a href="{% url 'register' %}" class="dark-pill-btn">Sign Up</a>
        </div>
    </div>

    <div class="login-content-box">

        <div class="login-form-side">
            <h1>Log in</h1>

            {% if error %}
                <div class="error-msg" style="color: #e94560; margin-bottom: 10px; font-weight: bold;">
                    {{ error }}
                </div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}

                <div class="modern-form-group">
                    <label for="username">Username or Email</label>
                    <input type="text" id="username" name="username"
                           placeholder="Enter your username or email" required>
                </div>

                <div class="modern-form-group">
                    <label for="password">Password</label>
                    <div style="position: relative;">
                        <input type="password" id="password" name="password"
                               placeholder="Enter your password" required
                               style="padding-right: 45px; width: 100%; box-sizing: border-box;">
                        <span onclick="togglePassword()"
                              style="position: absolute; right: 14px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 18px; user-select: none;">
                            👁️
                        </span>
                    </div>
                </div>

                <div class="forgot-pass">
                    <a href="#">Forgot Password?</a>
                </div>

                <button type="submit" class="dark-full-btn">Log In</button>
            </form>

            <div class="social-login-section">
                <p>Log in with</p>
                <div class="social-icons">
                    <i class="fab fa-google"></i>
                    <i class="fab fa-facebook-f"></i>
                    <i class="fab fa-instagram"></i>
                    <i class="fab fa-linkedin-in"></i>
                </div>
            </div>
        </div>

        <div class="login-image-side">
            <img src="{% static 'library/images/stack_of_books.png' %}"
                 alt="Stack of Books Illustration"
                 class="login-img">
        </div>

    </div>
</div>

<script>
function togglePassword() {
    const input = document.getElementById('password');
    const icon = document.querySelector('.toggle-icon');
    if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>

</body>
</html>
