{% extends 'library/base.html' %}
{% block title %}{{ action }} Member{% endblock %}

{% block content %}
<div class="form-box">
    <h2>👥 {{ action }} Member</h2>
    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" value="{{ member.name }}" required>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ member.email }}" required>
        </div>
        <div class="form-group">
            <label>Phone</label>
            <input type="text" name="phone" value="{{ member.phone }}" required>
        </div>
        <button type="submit" class="btn btn-primary">{{ action }} Member</button>
        <a href="{% url 'member_list' %}" class="btn" style="background:#aaa; color:white; margin-left:10px;">Cancel</a>
    </form>
</div>
{% endblock %}
